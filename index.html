body{
background:
linear-gradient(
to bottom,
#120000,
#220000,
#320000
);

/* HEADER */
.header{
position:sticky;
top:0;
z-index:100;

background:
rgba(15,0,0,0.95);

padding:15px;

display:flex;
align-items:center;
justify-content:space-between;

border-bottom:
1px solid rgba(255,0,0,0.2);
}

.logo{
font-size:35px;
font-weight:bold;
color:#ff295e;
}

/* SEARCH */
.search-box{
padding:15px;
}

.search{
width:100%;
padding:15px;

border:none;
outline:none;

border-radius:15px;

background:#2b0000;
color:white;
font-size:16px;
}

.search::placeholder{
color:#aaa;
}

/* CATEGORY */
.categories{
display:flex;
gap:10px;

overflow:auto;

padding:0 15px 15px;
}

.categories button{
border:none;

background:#2a0000;
color:white;

padding:10px 16px;

border-radius:12px;
cursor:pointer;
}

.categories button.active{
background:
linear-gradient(
45deg,
#ff003c,
#ff4d6d
);
}

/* GRID */
.grid{
display:grid;

grid-template-columns:
repeat(2,1fr);

gap:15px;
padding:15px;
}

/* CARD */
.card{
background:#1e0000;

border-radius:18px;
overflow:hidden;

border:1px solid
rgba(255,0,0,0.15);

transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.video-container{
position:relative;
}

video{
width:100%;
height:250px;

object-fit:cover;
background:black;
}

/* PLAY BUTTON */
.play-btn{
position:absolute;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

width:70px;
height:70px;

border-radius:50%;
border:none;

background:
rgba(255,0,60,0.9);

color:white;

font-size:30px;
cursor:pointer;
}

/* FULLSCREEN */
.fullscreen-btn{
position:absolute;

bottom:10px;
right:10px;

background:
rgba(0,0,0,0.7);

border:none;
color:white;

padding:8px 10px;

border-radius:10px;
cursor:pointer;

font-size:14px;
}

/* CONTENT */
.content{
padding:12px;
}

.title{
font-size:17px;
font-weight:bold;

line-height:1.4;

margin-bottom:8px;
}

.meta{
color:#aaa;
font-size:14px;
}

/* HIDE DOWNLOAD */
video::-internal-media-controls-download-button{
display:none;
}

video::-webkit-media-controls-enclosure{
overflow:hidden;
}

video::-webkit-media-controls-panel{
width:calc(100% + 30px);
}

/* ADS */
.ads-box{
padding:15px;
}

/* MOBILE */
@media(max-width:700px){

.grid{
grid-template-columns:1fr;
}

video{
height:220px;
}

}

<script>

/* FULLSCREEN */
function openFullscreen(button){

const video =
button.parentElement
.querySelector("video");

if(video.requestFullscreen){
video.requestFullscreen();
}

else if(video.webkitRequestFullscreen){
video.webkitRequestFullscreen();
}

else if(video.msRequestFullscreen){
video.msRequestFullscreen();
}

}
